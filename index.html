<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R1 Digivice - Color Edition</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .digivice-frame {
            background-image: url('https://raw.githubusercontent.com/core-zer0/DigipetR1/refs/heads/main/sprites/digivice-shell.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none; 
            box-shadow: none;
            width: 1000px;
            height: 1000px;
            padding-top: 228px;
            padding-bottom: 261px;
            padding-left: 257px;
            padding-right: 232px;
            position: relative;
        }

        .lcd-screen {
            background-color: #8b9d77;
            border: 6px solid #222;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            color: #111111;
        }

        .lcd-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .view-port {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

    </style>
</head>
<body>
    <div class="digivice-frame">
        <div class="lcd-screen">
            <div class="view-port" id="view-port"></div>
        </div>
    </div>

    <!-- Scripts en orden de dependencia -->
    <script src="js/hardware.js"></script>
    <script src="js/creature.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
