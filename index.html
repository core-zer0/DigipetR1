<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R1 Digivice - Color Edition</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .digivice-frame {
            background-image: url('https://raw.githubusercontent.com/core-zer0/DigipetR1/refs/heads/main/sprites/digivice-shell.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none; 
            box-shadow: none;
            width: 1000px;
            height: 1000px;
            padding-top: 228px;
            padding-bottom: 261px;
            padding-left: 257px;
            padding-right: 232px;
            position: relative;
        }

        .digivice-frame::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 40px;
            width: 30px;
            height: 20px;
            background: #222;
            border-radius: 5px 5px 0 0;
        }

        .lcd-screen {
            background-color: #8b9d77;
            border: 6px solid #222;
            border-radius: 10px;
            width: 100%;
            height: 240px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            color: #111111;
        }

        .lcd-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none; /* Crucial: permite tocar el teclado de debajo */
            z-index: 10;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            font-size: 1.1rem;
            letter-spacing: 4px;
            border-bottom: 1px dashed #888;
            padding-bottom: 4px;
            height: 25px;
        }

        .view-port {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sprite-grid-render {
            display: inline-block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            margin: 20px 0;
            width: calc(var(--w) * 1px);
            height: calc(var(--h) * 1px);
            background-image: var(--sheet-url);
            background-size: var(--sheet-w) var(--sheet-h);
            background-repeat: no-repeat;
            --start-x: calc(var(--offset-x) + (var(--col) * (var(--w) + 1)));
            --start-y: calc(var(--offset-y) + (var(--row) * (var(--h) + 1)));
            background-position: calc(var(--start-x) * -1px) calc(var(--start-y) * -1px);
        }

        @keyframes play-anim {
            from { background-position: calc(var(--start-x) * -1px) calc(var(--start-y) * -1px); }
            to { background-position: calc((var(--start-x) + (var(--frames) * (var(--w) + 1))) * -1px) calc(var(--start-y) * -1px); }
        }

        .action-menu {
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #888;
            padding-top: 6px;
            height: 35px;
        }

        .menu-icon {
            font-size: 1.1rem;
            opacity: 0.25;
            padding: 2px 4px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .menu-icon.active {
            opacity: 1;
            background-color: rgba(0,0,0,0.08);
            border: 1px solid #444;
        }

        .menu-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #222;
            margin-bottom: 2px;
        }
        
        .menu-list {
            font-size: 0.8rem;
            line-height: 1.2;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="digivice-frame">
        <div class="lcd-screen">
            <div class="status-bar" id="status-bar">🥚 🔋 ✨</div>
            <div class="view-port" id="view-port"></div>
            <div class="action-menu" id="action-menu">
                <span class="menu-icon" id="icon-0">🍖</span>
                <span class="menu-icon" id="icon-1">⚔️</span>
                <span class="menu-icon" id="icon-2">🛒</span>
                <span class="menu-icon" id="icon-3">💬</span>
                <span class="menu-icon" id="icon-4">💤</span>
                <span class="menu-icon" id="icon-5">🧹</span>
                <span class="menu-icon" id="icon-6">💊</span>
            </div>
        </div>
    </div>

    <script src="js/roster.js"></script>
    <script src="js/app.js"></script>
    <script src="js/hardware.js"></script>
</body>
</html>
