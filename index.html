<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R1 Digivice - Color Edition</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* Contenedor flexible que escala el frame de 1000px si la pantalla es menor */
        .digivice-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .digivice-frame {
            background-image: url('sprites/digivice-shell.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 1000px;
            height: 1000px;
            /* Máximo tamaño responsive para que quepa en cualquier pantalla sin cortarse */
            max-width: 96vmin;
            max-height: 96vmin;
            aspect-ratio: 1 / 1;
            
            /* Paddings en porcentaje basados en tus medidas exactas (228, 261, 257, 232) */
            padding-top: 22.8%;
            padding-bottom: 26.1%;
            padding-left: 25.7%;
            padding-right: 23.2%;
            position: relative;
        }

        .lcd-screen {
            background-color: #8b9d77;
            border: 6px solid #222;
            border-radius: 12px;
            width: 100%;
            height: 100%; /* Ocupa el 100% del hueco de 512x512px */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.35);
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            color: #111111;
        }

        .lcd-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none; /* Crucial: permite hacer clic a los elementos de debajo */
            z-index: 10;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            font-size: 1.5rem; /* Tamaño aumentado para pantalla de 512px */
            letter-spacing: 6px;
            border-bottom: 2px dashed #666;
            padding-bottom: 8px;
            height: 40px;
            font-weight: bold;
        }

        .view-port {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.3s ease-out;
            cursor: pointer; /* Indica que se puede tocar la pantalla (para incubar/despertar) */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sprite-grid-render {
            display: inline-block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            margin: 25px 0;
            width: calc(var(--w) * 1px);
            height: calc(var(--h) * 1px);
            background-image: var(--sheet-url);
            background-size: var(--sheet-w) var(--sheet-h);
            background-repeat: no-repeat;
            --start-x: calc(var(--offset-x) + (var(--col) * (var(--w) + 1)));
            --start-y: calc(var(--offset-y) + (var(--row) * (var(--h) + 1)));
            background-position: calc(var(--start-x) * -1px) calc(var(--start-y) * -1px);
        }

        @keyframes play-anim {
            from { background-position: calc(var(--start-x) * -1px) calc(var(--start-y) * -1px); }
            to { background-position: calc((var(--start-x) + (var(--frames) * (var(--w) + 1))) * -1px) calc(var(--start-y) * -1px); }
        }

        .action-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed #666;
            padding-top: 10px;
            height: 50px;
        }

        .menu-icon {
            font-size: 1.6rem;
            opacity: 0.35;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.15s ease-in-out;
            cursor: pointer; /* Hace que el cursor cambie a mano al pasar por encima */
        }

        .menu-icon:hover {
            opacity: 0.7;
        }

        .menu-icon.active {
            opacity: 1;
            background-color: rgba(0, 0, 0, 0.15);
            border: 2px solid #111;
            transform: scale(1.15);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .menu-title {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #111;
            margin-bottom: 6px;
            font-weight: 900;
        }
        
        .menu-list {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #222;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="digivice-wrapper">
        <div class="digivice-frame">
            <div class="lcd-screen">
                <div class="status-bar" id="status-bar">🥚 🔋 ✨</div>
                <div class="view-port" id="view-port" onclick="ejecutarAccionFisica()"></div>
                <div class="action-menu" id="action-menu">
                    <span class="menu-icon" id="icon-0" onclick="seleccionarYEjecutar(0)" title="Alimentar">🍖</span>
                    <span class="menu-icon" id="icon-1" onclick="seleccionarYEjecutar(1)" title="Combate">⚔️</span>
                    <span class="menu-icon" id="icon-2" onclick="seleccionarYEjecutar(2)" title="Tienda">🛒</span>
                    <span class="menu-icon" id="icon-3" onclick="seleccionarYEjecutar(3)" title="Chat IA">💬</span>
                    <span class="menu-icon" id="icon-4" onclick="seleccionarYEjecutar(4)" title="Dormir">💤</span>
                    <span class="menu-icon" id="icon-5" onclick="seleccionarYEjecutar(5)" title="Limpiar">🧹</span>
                    <span class="menu-icon" id="icon-6" onclick="seleccionarYEjecutar(6)" title="Curar">💊</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/roster.js"></script>
    <script src="js/app.js"></script>
    <script src="js/hardware.js"></script>
</body>
</html>
